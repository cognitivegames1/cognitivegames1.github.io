<!doctype html>
<html lang="en" data-game-slug="number-sweep" data-lobby-href="../index.html">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Sweep Game - Cognitive Games</title>
    <meta
      name="description"
      content="Tap scattered numbers in ascending order as quickly as possible. One wrong tap ends the round in this speed-and-focus challenge."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="/games/number-sweep.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Number Sweep - Cognitive Games" />
    <meta property="og:description" content="Hit numbers in ascending order at top speed." />
    <meta property="og:url" content="/games/number-sweep.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/chessboard.css" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="play-body">
    <header class="play-top">
      <a class="back-link" href="../index.html">&larr; Lobby</a>
      <h1 id="play-title">Number Sweep</h1>
      <div class="stat-bar">
        <span class="stat timer" id="stat-time" aria-live="polite">0.00s</span>
        <span class="stat score" id="stat-score" aria-live="polite">Score: 0</span>
        <button type="button" class="btn-restart" id="btn-restart">Restart</button>
      </div>
    </header>
    <main class="play-main">
      <section class="game-summary">
        <p>Scan quickly, then tap every number in order without a single mistake.</p>
      </section>
      <section class="instructions" id="instructions-panel">
        <div id="instructions-text"></div>
        <div class="instructions-actions">
          <button type="button" class="btn-primary" id="btn-start-round">Start round</button>
        </div>
      </section>
      <div id="game-root"></div>
      <section class="result-panel hidden" id="result-panel" aria-live="polite">
        <h2 id="result-title">Round complete</h2>
        <p id="result-detail"></p>
        <button type="button" class="btn-primary" id="btn-play-again">Play again</button>
      </section>
    </main>
    <script type="module" src="../js/play.js"></script>
  </body>
</html>
