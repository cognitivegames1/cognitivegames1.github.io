<!doctype html>
<html lang="en" data-game-slug="pair-recall" data-lobby-href="../index.html">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pair Recall - Cognitive Games</title>
    <meta name="description" content="Flip two cards at a time and clear the board from memory in as few tries as possible." />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="/games/pair-recall.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pair Recall - Cognitive Games" />
    <meta property="og:description" content="Match every card pair in as few tries as possible." />
    <meta property="og:url" content="/games/pair-recall.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <header class="play-top">
      <a class="back-link" href="../index.html">&larr; Lobby</a>
      <h1 id="play-title">Pair Recall</h1>
      <div class="stat-line" aria-live="polite">
        <span id="stat-time">0.00s</span>
        <span class="sep">·</span>
        <span>Score <strong id="stat-score">0</strong></span>
        <span class="sep">·</span>
        <span>Round <strong id="stat-round">0/0</strong></span>
      </div>
      <button type="button" class="btn ghost small" id="btn-restart">Restart</button>
    </header>
    <main class="play-main">
      <section class="instructions-inline" id="instructions-panel">
        <p class="lead">Flip two cards, learn the board, and clear every pair in as few tries as possible.</p>
        <details><summary>More</summary><div id="instructions-text"></div></details>
        <div><button type="button" class="btn" id="btn-start-round">Start round</button></div>
      </section>

      <div class="game-root" id="game-root"></div>

      <section class="result-panel hidden" id="result-panel" aria-live="polite">
        <h2 class="result-title" id="result-title">Round complete</h2>
        <p class="result-detail" id="result-detail"></p>
        <div><button type="button" class="btn" id="btn-play-again">Next round</button></div>
      </section>
    </main>
    <script type="module" src="../js/play.js"></script>
  </body>
</html>
